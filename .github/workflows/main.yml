name: Supabase Keep Alive

on:
  schedule:
    # Se ejecuta todos los días a las 00:00 UTC (6:00 PM hora México aprox)
    - cron: '0 0 * * *'
  workflow_dispatch: # Esto te permite darle a un botón para probarlo cuando quieras

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping Request
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/ping" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
